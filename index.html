<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>딥하우스 라운지 파티 — 기획 보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
  /* 테마를 스타일 적용 전에 즉시 세팅해 깜빡임(FOUC) 방지 */
  (function(){
    try{
      var t = localStorage.getItem("party-board-theme");
      if(t!=="light" && t!=="dark"){
        t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    }catch(e){ document.documentElement.setAttribute("data-theme","dark"); }
  })();
</script>
<style>
  :root, :root[data-theme="dark"]{
    --ink:#100E0C; --panel:#1F1B16; --panel-2:#28231C; --panel-3:#322B22;
    --line:#4C4438; --line-soft:#39322A;
    --bone:#F4EEE2; --muted:#B8AD9D; --muted-2:#8E8375;
    --amber:#F6B44E; --amber-dim:#8A6A2E;
    --patina:#83BCB0; --patina-dim:#37544F;
    --blood:#C85A4C; --radius:3px;
    /* semantic surfaces & text */
    --body-text:#DAD1C3; --rule-text:#E4DBCD; --banner-text:#F0CFC9;
    --on-accent:#14110E;
    --fill:rgba(255,255,255,.04); --fill-soft:rgba(255,255,255,.02);
    --inset:rgba(0,0,0,.22); --code-bg:rgba(0,0,0,.35);
    --bar-bg:rgba(16,14,12,.92);
    --glow-amber:rgba(240,169,59,.10); --glow-patina:rgba(111,168,156,.05);
    color-scheme:dark;
  }
  :root[data-theme="light"]{
    --ink:#F3EEE3; --panel:#FBF7EF; --panel-2:#FFFFFF; --panel-3:#F5F0E6;
    --line:#D6CCB9; --line-soft:#E6DECE;
    --bone:#211A11; --muted:#5C5343; --muted-2:#867B69;
    --amber:#AE7414; --amber-dim:#D8B573;
    --patina:#367C6E; --patina-dim:#A9D0C6;
    --blood:#AE3527; --radius:3px;
    --body-text:#3B3226; --rule-text:#332A1C; --banner-text:#8A2E22;
    --on-accent:#FBF7EF;
    --fill:rgba(0,0,0,.035); --fill-soft:rgba(0,0,0,.02);
    --inset:rgba(0,0,0,.03); --code-bg:rgba(0,0,0,.06);
    --bar-bg:rgba(243,238,227,.92);
    --glow-amber:rgba(174,116,20,.10); --glow-patina:rgba(54,124,110,.07);
    color-scheme:light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--ink);
    background-image:
      radial-gradient(1100px 600px at 50% -12%, var(--glow-amber), transparent 65%),
      radial-gradient(700px 500px at 100% 100%, var(--glow-patina), transparent 60%);
    background-attachment:fixed;
    color:var(--bone);
    font-family:"IBM Plex Sans KR", system-ui, sans-serif;
    font-weight:300; line-height:1.62; -webkit-font-smoothing:antialiased;
    padding:0 20px 90px;
    transition:background-color .3s ease, color .3s ease;
  }
  .wrap{max-width:980px;margin:0 auto}
  .mono{font-family:"IBM Plex Mono", ui-monospace, monospace}

  /* toolbar */
  .bar{position:sticky;top:0;z-index:50;margin:0 -20px;padding:9px 20px;
    background:var(--bar-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft);
    display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .bar .spacer{flex:1}
  .btn{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    background:var(--fill);border:1px solid var(--line);color:var(--muted);
    padding:7px 12px;border-radius:var(--radius);cursor:pointer;transition:.18s}
  .btn:hover{color:var(--bone);border-color:var(--muted-2)}
  .btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .btn.on{background:var(--amber);border-color:var(--amber);color:var(--on-accent);font-weight:600}
  .btn.ghost{border-color:transparent}
  .status{display:flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",monospace;font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);flex:none;transition:.3s}
  .dot.live{background:var(--patina);box-shadow:0 0 8px rgba(111,168,156,.8)}
  .dot.saving{background:var(--amber);box-shadow:0 0 8px rgba(240,169,59,.8)}
  .dot.err{background:var(--blood)}
  .who{font-family:"IBM Plex Mono",monospace;font-size:11px;background:var(--fill);
    border:1px solid var(--line);color:var(--bone);border-radius:var(--radius);padding:6px 9px;width:96px}
  .who:focus{outline:1px solid var(--amber)}
  .banner{background:rgba(169,68,56,.12);border:1px solid rgba(169,68,56,.5);border-radius:var(--radius);
    padding:12px 16px;margin:16px auto 0;max-width:980px;font-size:13px;color:var(--banner-text)}
  .banner b{color:var(--blood)}
  .banner code{font-family:"IBM Plex Mono",monospace;font-size:12px;background:var(--code-bg);padding:2px 5px;border-radius:2px}

  header{padding:52px 0 40px;border-bottom:1px solid var(--line-soft)}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber);margin-bottom:20px}
  h1{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(34px,6.4vw,60px);line-height:1.05}
  h1 .accent{color:var(--amber);display:block}
  .sub{color:var(--muted);font-size:15px;margin-top:18px;max-width:58ch}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:26px;align-items:center}
  .chip{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.08em;color:var(--muted);
    border:1px solid var(--line);border-radius:var(--radius);padding:6px 11px;background:var(--fill-soft);
    display:inline-flex;align-items:center}
  .chip b{color:var(--bone);font-weight:500}

  .cards{margin-top:44px;display:flex;flex-direction:column;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden;transition:.25s}
  .card[data-open="true"]{border-color:var(--line);background:var(--panel-2)}
  .card-head{width:100%;background:none;border:0;color:inherit;cursor:pointer;display:flex;align-items:center;gap:18px;text-align:left;padding:20px 22px;font:inherit}
  .card-head:hover .card-title{color:var(--amber)}
  .card-head:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .num{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted-2);letter-spacing:.1em;flex:none;width:26px}
  .card[data-open="true"] .num{color:var(--amber)}
  .card-title{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:clamp(17px,2.3vw,21px);flex:1;transition:color .2s}
  .card-hint{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.14em;color:var(--muted-2);text-transform:uppercase;display:none}
  @media(min-width:620px){.card-hint{display:block}}
  .toggle{flex:none;width:22px;height:22px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;color:var(--muted);font-size:13px;line-height:1;transition:.3s}
  .card[data-open="true"] .toggle{transform:rotate(45deg);border-color:var(--amber);color:var(--amber)}
  .card-body{display:none;padding:2px 22px 26px}
  .card[data-open="true"] .card-body{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .card-move{display:none}
  body.edit .card-move{display:inline-flex;gap:4px}
  .mv{width:20px;height:20px;border:1px solid var(--line);background:none;color:var(--muted);border-radius:2px;
    font-size:10px;line-height:1;cursor:pointer;display:grid;place-items:center}
  .mv:hover{border-color:var(--amber);color:var(--amber)}

  .ed{outline:none;border-radius:2px}
  body.edit .ed{background:rgba(240,169,59,.05);box-shadow:inset 0 -1px 0 rgba(240,169,59,.28);padding:0 3px;margin:0 -3px;cursor:text}
  body.edit .ed:hover{background:rgba(240,169,59,.11)}
  body.edit .ed:focus{background:rgba(240,169,59,.14);box-shadow:inset 0 0 0 1px var(--amber)}
  .del,.add{display:none}
  body.edit .del{display:inline-grid;place-items:center;width:17px;height:17px;flex:none;
    border:1px solid rgba(169,68,56,.5);background:rgba(169,68,56,.12);color:var(--blood);
    border-radius:2px;font-size:11px;line-height:1;cursor:pointer;margin-left:6px;vertical-align:middle}
  body.edit .del:hover{background:var(--blood);color:var(--on-accent)}
  body.edit .add{display:inline-flex;align-items:center;gap:5px;margin-top:10px;
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    border:1px dashed var(--amber-dim);background:none;color:var(--amber);padding:5px 10px;border-radius:2px;cursor:pointer}
  body.edit .add:hover{background:rgba(240,169,59,.1)}
  .addrow{display:flex;gap:6px;flex-wrap:wrap}
  .editonly{display:none}
  body.edit .editonly{display:block}
  body.edit .addrow.editonly{display:flex}
  .addcard-row{display:none;gap:8px;margin-top:6px}
  body.edit .addcard-row.editonly{display:flex}
  .addcard{flex:1;margin-top:0;padding:16px;border:1px dashed var(--line);background:none;
    color:var(--muted-2);font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;border-radius:var(--radius);cursor:pointer;transition:.2s}
  .addcard:hover{border-color:var(--amber);color:var(--amber);background:rgba(240,169,59,.04)}

  /* comment count in card head */
  .head-cmt{font-family:"IBM Plex Mono",monospace;font-size:10px;flex:none;white-space:nowrap;
    padding:3px 8px;border-radius:20px;border:1px solid var(--line)}
  .head-cmt.has-open{color:var(--amber);border-color:var(--amber-dim);background:rgba(240,169,59,.08)}
  .head-cmt.has-open b{color:var(--amber);font-weight:600}
  .head-cmt.all-done{color:var(--patina);border-color:var(--patina-dim);background:rgba(111,168,156,.10)}

  /* free-form table card */
  .table-wrap{overflow-x:auto;border:1px solid var(--line-soft);border-radius:var(--radius)}
  table.grid{border-collapse:collapse;width:100%;font-size:14px}
  table.grid th,table.grid td{border:1px solid var(--line-soft);padding:0;text-align:left;vertical-align:top;min-width:88px}
  table.grid th{background:var(--inset);color:var(--bone);font-weight:600}
  table.grid td{color:var(--body-text)}
  table.grid tr:nth-child(even) td{background:var(--fill-soft)}
  table.grid .grid-ctrl,table.grid .grid-colctrl td{border-color:transparent;background:none;min-width:0;padding:4px;text-align:center}
  table.grid .del{position:static}
  .tcell{display:block;min-height:1.3em;padding:9px 12px;outline:none;cursor:text}
  .tcell:hover{background:var(--fill-soft)}
  body.edit .tcell{background:none;box-shadow:none;padding:9px 12px;margin:0}
  .tcell:focus,body.edit .tcell:focus{background:rgba(240,169,59,.12);box-shadow:inset 0 0 0 1px var(--amber)}
  .table-tools{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tbtn{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    border:1px dashed var(--amber-dim);background:none;color:var(--amber);padding:6px 12px;border-radius:2px;cursor:pointer;transition:.18s}
  .tbtn:hover{background:rgba(240,169,59,.1);border-style:solid}

  /* comment thread */
  .thread{margin-top:24px;border-top:1px solid var(--line-soft);padding-top:16px}
  .thread-h{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-2);margin-bottom:12px}
  .thread-h b{color:var(--amber)}
  .thread-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .cmt{border:1px solid var(--line-soft);border-left:2px solid var(--patina-dim);border-radius:var(--radius);
    padding:10px 13px;background:var(--fill-soft);transition:.2s}
  .cmt.done{border-left-color:var(--patina);opacity:.72}
  .cmt.done .cmt-text{color:var(--muted)}
  .cmt-meta{font-size:10px;color:var(--muted-2);display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .cmt-meta b{color:var(--patina);font-weight:600;letter-spacing:.04em}
  .cmt-status{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.08em;padding:2px 7px;border-radius:20px;
    border:1px solid var(--amber-dim);background:rgba(240,169,59,.08);color:var(--amber);cursor:pointer;margin-left:auto;white-space:nowrap;transition:.18s}
  .cmt-status.done{border-color:var(--patina-dim);background:rgba(111,168,156,.12);color:var(--patina)}
  .cmt-status:hover{filter:brightness(1.15)}
  .cmt-del{border:0;background:none;color:var(--muted-2);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
  .cmt-del:hover{color:var(--blood)}
  .cmt-text{font-size:14px;color:var(--body-text);white-space:pre-wrap;word-break:break-word}
  .cmt-empty{font-size:11px;color:var(--muted-2);letter-spacing:.04em;padding:4px 0 8px;opacity:.8}
  /* replies */
  .rpl-wrap{margin-top:9px;padding-left:12px;border-left:1px solid var(--line-soft);display:flex;flex-direction:column;gap:7px}
  .rpl{padding:2px 0}
  .rpl .cmt-text{font-size:13px}
  .rpl-add{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .rpl-input{min-width:140px;font-size:12.5px;padding:6px 10px}
  .rpl-add .thread-send{font-size:10px;padding:5px 10px}
  .thread-add{display:flex;gap:8px;flex-wrap:wrap}
  .thread-input{flex:1;min-width:180px;font-family:"IBM Plex Sans KR",sans-serif;font-size:13.5px;
    background:var(--fill);border:1px solid var(--line);color:var(--bone);border-radius:var(--radius);padding:9px 12px}
  .thread-input::placeholder{color:var(--muted-2)}
  .thread-input:focus{outline:none;border-color:var(--amber)}
  .thread-send{flex:none;cursor:pointer}

  .steps{list-style:none;border-top:1px solid var(--line-soft)}
  .step{display:flex;gap:16px;padding:13px 0;border-bottom:1px solid var(--line-soft);align-items:baseline}
  .step-i{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted-2);flex:none;width:22px}
  body.edit .step-i{cursor:pointer}
  .step-t{font-weight:500;font-size:15px;flex:none;min-width:150px}
  .step-d{color:var(--muted);font-size:14px;flex:1}
  .step[data-state="done"] .step-i{color:var(--patina)}
  .step[data-state="now"]{background:linear-gradient(90deg,rgba(240,169,59,.09),transparent 70%);margin:0 -12px;padding:13px 12px;border-left:2px solid var(--amber)}
  .step[data-state="now"] .step-i,.step[data-state="now"] .step-t{color:var(--amber)}
  .hintline{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.1em;color:var(--muted-2);margin-top:12px}

  .warn{margin-top:22px;border:1px solid var(--line);border-left:2px solid var(--blood);border-radius:var(--radius);padding:16px 18px;background:rgba(169,68,56,.06)}
  .warn-h{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--blood);margin-bottom:12px;display:flex}
  .warn-h .ed{flex:1}
  .warn p{font-size:14px;color:var(--muted);margin-bottom:9px}
  .warn p:last-of-type{margin-bottom:0}
  .warn b{color:var(--bone);font-weight:600}

  .ra{display:grid;gap:12px;padding-top:6px}
  @media(min-width:760px){.ra{grid-template-columns:1fr 1fr}}
  .ra-item{border:1px solid var(--line-soft);border-radius:var(--radius);padding:18px;background:var(--inset)}
  .ra-lab{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:3px 7px;border-radius:2px;display:inline-block;margin-bottom:12px}
  body.edit .ra-lab{cursor:pointer}
  .ra-item[data-k="asset"]{border-left:2px solid var(--patina)}
  .ra-item[data-k="asset"] .ra-lab{color:var(--patina);border:1px solid var(--patina-dim);background:rgba(111,168,156,.08)}
  .ra-item[data-k="risk"]{border-left:2px solid var(--blood)}
  .ra-item[data-k="risk"] .ra-lab{color:var(--blood);border:1px solid rgba(169,68,56,.4);background:rgba(169,68,56,.08)}
  .ra-item[data-k="both"]{border-left:2px solid var(--amber)}
  .ra-item[data-k="both"] .ra-lab{color:var(--amber);border:1px solid var(--amber-dim);background:rgba(240,169,59,.08)}
  .ra-t{font-weight:600;font-size:16px;margin-bottom:8px}
  .ra-d{font-size:14px;color:var(--muted)}
  .ra-d b{color:var(--bone);font-weight:600}
  .ra-do{margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--amber)}

  .board-note{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);display:flex;gap:16px;flex-wrap:wrap;padding:4px 0 14px}
  .legend{display:flex;align-items:center;gap:6px}
  .swatch{width:16px;height:6px;border-radius:1px}
  .sw-a{background:var(--amber)} .sw-p{background:var(--patina)}
  .board{display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--line-soft);padding-top:12px}
  .strip{background:var(--inset);border:1px solid var(--line-soft);border-radius:var(--radius);cursor:pointer;
    display:grid;grid-template-columns:78px 1fr;gap:4px 16px;align-items:center;padding:13px 14px;transition:.25s}
  @media(min-width:720px){.strip{grid-template-columns:82px minmax(140px,1fr) 132px 74px 20px;gap:16px}}
  .strip:hover{background:rgba(240,169,59,.05);border-color:var(--amber-dim)}
  .strip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .strip.sel{background:linear-gradient(90deg,rgba(240,169,59,.14),rgba(240,169,59,.03));border-color:var(--amber);
    box-shadow:0 0 26px -8px rgba(240,169,59,.5), inset 0 0 30px -22px var(--amber)}
  .s-time{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted)}
  .strip.sel .s-time{color:var(--amber)}
  .s-name{font-weight:500;font-size:15px}
  .s-name small{display:block;font-weight:300;font-size:12px;color:var(--muted-2)}
  .s-bpm{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted-2)}
  .s-arrow{color:var(--muted-2);font-size:12px;display:none}
  @media(min-width:720px){.s-arrow{display:block}}
  .strip.sel .s-arrow{color:var(--amber)}
  .meters{display:flex;flex-direction:column;gap:4px;grid-column:2/-1}
  @media(min-width:720px){.meters{grid-column:auto}}
  .meter{display:flex;align-items:center;gap:6px}
  .m-lab{font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.12em;color:var(--muted-2);width:34px;flex:none}
  .m-bars{display:flex;gap:2px}
  .m-bars i{width:9px;height:7px;border-radius:1px;background:var(--line);transition:.3s}
  body.edit .m-bars i{cursor:pointer}
  .meter[data-type="snd"] i.on{background:var(--amber)}
  .meter[data-type="soc"] i.on{background:var(--patina)}
  .strip.sel .meter[data-type="snd"] i.on{box-shadow:0 0 8px rgba(240,169,59,.8)}
  .strip.sel .meter[data-type="soc"] i.on{box-shadow:0 0 8px rgba(111,168,156,.7)}

  .detail{margin-top:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel-3);overflow:hidden}
  .d-head{padding:20px 22px 0;border-bottom:1px solid var(--line-soft)}
  .d-kicker{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
  .d-title{font-family:"Black Han Sans",sans-serif;font-weight:400;font-size:22px;margin:8px 0 4px}
  .d-sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:-1px;align-items:center}
  .tab{background:none;border:1px solid transparent;border-bottom:none;color:var(--muted);font:inherit;font-size:13px;cursor:pointer;padding:9px 15px;border-radius:var(--radius) var(--radius) 0 0;transition:.18s}
  .tab:hover{color:var(--bone);background:var(--fill)}
  .tab.sel{color:var(--amber);font-weight:500;background:var(--panel-2);border-color:var(--line-soft);border-bottom:1px solid var(--panel-2)}
  .d-body{padding:24px 22px 26px;background:var(--panel-2)}

  .blk{margin-bottom:24px}
  .blk:last-child{margin-bottom:0}

          {x:0,t:"조명 장비가 있나요? 없다면 <b>소형 조명(LED 바, 미러볼)을 가져와 설치</b>해도 되나요?"},
          {x:0,t:"벽 / 천장에 <b>가벼운 장식</b>을 붙여도 되나요? 허용되는 부착 방식은?"},
          {x:0,t:"캔들 사용이 가능한가요?"},
          {x:0,t:"<b>프로젝터 / 스크린 / TV</b>가 있나요?"},
          {x:0,t:"입구나 1층에 파티 안내 사인을 세워도 되나요?"}]},
        {s:"E. 운영 · 기타",q:[
          {x:1,t:"<b>답사 가능한 날짜</b>와 담당자 연락처를 알려주실 수 있나요? 방문 시 <b>컨트롤러를 가져와 연결 테스트</b>를 하고 싶습니다."},
          {x:0,t:"<b>사진 · 영상 촬영</b>이 가능한가요? 제한이 있나요?"},
          {x:0,t:"외투 / 짐 보관 공간이 있나요?"},
          {x:0,t:"주차 및 대중교통 안내 (게스트 공지용)"},
          {x:0,t:"파손 · 분실 책임 범위와 보증금이 있나요?"}]}
      ]}
  ]
};

/* ================= state ================= */
let M = clone(DEFAULT);
let EDIT=false, LIVE=false, sb=null, pendingRemote=null, saveT=null;
const CID = Math.random().toString(36).slice(2,10);
let NAME = "익명";
/* 카드 펼침 상태는 "보는 사람"만의 로컬 상태 — 저장/동기화하지 않는다 (id 기준) */
const OPEN = new Set();
let OPEN_SEEDED = false;
function seedOpen(){
  if(OPEN_SEEDED) return;
  OPEN_SEEDED = true;
  M.cards.forEach(c=>{ if(c.open) OPEN.add(c.id); });
}
function isOpen(c){ return OPEN.has(c.id); }

function clone(o){ return JSON.parse(JSON.stringify(o)); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }
function fmtTime(ts){ if(!ts) return ""; try{ return new Date(ts).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function uid(p){ return (p||"") + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getAt(p){ return p.split(".").reduce((o,k)=>o[isNaN(k)?k:+k],M); }
function setAt(p,v){ const k=p.split("."), last=k.pop();
  const o=k.reduce((o,x)=>o[isNaN(x)?x:+x],M); o[isNaN(last)?last:+last]=v; }
function delAt(p){ const k=p.split("."), last=+k.pop();
  k.reduce((o,x)=>o[isNaN(x)?x:+x],M).splice(last,1); }
function moveAt(p,dir){ const k=p.split("."), i=+k.pop();
  const arr=k.reduce((o,x)=>o[isNaN(x)?x:+x],M);
  const j=i+dir; if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
}

const E=(p,c="")=>`<span class="ed ${c}" data-p="${p}" ${EDIT?'contenteditable="true"':''}>${getAt(p)}</span>`;
const DEL=p=>`<button class="del" data-del="${p}" title="삭제">×</button>`;
const ADD=(a,l)=>`<button class="add" data-add="${a}">+ ${l}</button>`;

/* ================= sync ================= */
function setStatus(cls,txt){
  const d=document.getElementById("dot"); d.className="dot "+cls;
  document.getElementById("stat").textContent=txt;
}
async function connect(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY){
    setStatus("err","오프라인");
    const b=document.getElementById("banner");
    b.hidden=false;
    b.innerHTML="<b>Supabase가 설정되지 않았습니다.</b> 지금은 저장·공유가 되지 않습니다. <code>index.html</code> 상단의 <code>SUPABASE_URL</code>과 <code>SUPABASE_ANON_KEY</code>를 채우세요.";
    return;
  }
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  try{
    const { data, error } = await sb.from("board").select("data").eq("id",BOARD_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data) M = data.data;
    else await sb.from("board").insert({ id:BOARD_ID, data:M, client_id:CID, updated_by:NAME });
    render();
    sb.channel("board-"+BOARD_ID)
      .on("postgres_changes",
        { event:"*", schema:"public", table:"board", filter:"id=eq."+BOARD_ID },
        payload=>{
          const row=payload.new;
          if(!row || row.client_id===CID) return;   // 내가 쓴 건 무시
          applyRemote(row.data, row.updated_by);
        })
      .subscribe(s=>{
        if(s==="SUBSCRIBED"){ LIVE=true; setStatus("live","실시간 연결됨"); }
      });
  }catch(e){
    console.error(e);
    setStatus("err","연결 실패");
    const b=document.getElementById("banner");
    b.hidden=false;
    b.innerHTML="<b>Supabase 연결 실패.</b> URL/키 또는 테이블·RLS 설정을 확인하세요. 콘솔에 상세 오류가 있습니다.";
  }
}
function applyRemote(data, who){
  // 누가 타이핑 중이면 커서가 튀지 않도록 blur 될 때까지 보류
  const el=document.activeElement;
  if(el && (el.isContentEditable || el.classList.contains("thread-input"))){ pendingRemote={data,who}; return; }
  M=data; render();
  setStatus("live", (who||"누군가")+" 수정함");
  setTimeout(()=>{ if(LIVE) setStatus("live","실시간 연결됨"); },2200);
}
document.addEventListener("focusout",()=>{
  if(pendingRemote){ const {data,who}=pendingRemote; pendingRemote=null; applyRemote(data,who); }
});
function save(){
  if(!sb){ return; }
  setStatus("saving","저장 중…");
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    const { error } = await sb.from("board").upsert({
      id:BOARD_ID, data:M, client_id:CID, updated_by:NAME, updated_at:new Date().toISOString()
    });
    if(error){ console.error(error); setStatus("err","저장 실패"); return; }
    setStatus(LIVE?"live":"", "저장됨");
    setTimeout(()=>{ if(LIVE) setStatus("live","실시간 연결됨"); },1400);
  },500);
}

/* ================= render ================= */
function render(){
  document.querySelector('[data-p="head.t1"]').innerHTML=M.head.t1;
  document.querySelector('[data-p="head.t2"]').innerHTML=M.head.t2;
  document.querySelector('[data-p="head.sub"]').innerHTML=M.head.sub;
  document.querySelectorAll("header .ed").forEach(e=>{
    if(EDIT) e.setAttribute("contenteditable","true"); else e.removeAttribute("contenteditable");
  });
  document.getElementById("chips").innerHTML =
    M.head.chips.map((c,i)=>`<span class="chip">${E("head.chips."+i)}${DEL("head.chips."+i)}</span>`).join("")+ADD("chip","칩");
  document.getElementById("cards").innerHTML = M.cards.map((c,i)=>cardShell(c,i)).join("");
  wire();
}
function cardShell(c,i){
  const n=String(i+1).padStart(2,"0");
  let body="", hint="";
  if(c.type==="steps"){ body=viewSteps(i); hint=c.items.length+" Steps"; }
  else if(c.type==="ra"){ body=viewRA(i); hint=c.items.length+" Findings"; }
  else if(c.type==="timeline"){ body=viewTimeline(i); hint="Click a strip"; }
  else if(c.type==="venue"){ const r=venueCount(c); body=viewVenue(i); hint=r.done+"/"+r.total; }
  else if(c.type==="table"){ body=viewTable(i); const r=(c.rows||[]).length, cl=(c.rows&&c.rows[0]?c.rows[0].length:0); hint=r+"×"+cl+" Table"; }
  else { body=viewCustom(i); hint="Notes"; }
  const comments=c.comments||[];
  const cmtN=comments.length;
  const openN=comments.filter(x=>x.status!=="done").length;
  return `<section class="card" data-open="${isOpen(c)}">
    <button class="card-head" data-card="${i}">
      <span class="num mono">${n}</span>
      <span class="card-title">${E("cards."+i+".title")}</span>
      <span class="card-hint mono">${hint}</span>
      ${cmtN?`<span class="head-cmt mono ${openN?"has-open":"all-done"}" title="의견 ${cmtN}개 · 미해결 ${openN}개">💬 ${cmtN}${openN?` · <b>${openN}</b> 오픈`:" · 완료"}</span>`:""}
      <span class="card-move">
        <button class="mv" data-mv="cards.${i}|-1" title="위로">▲</button>
        <button class="mv" data-mv="cards.${i}|1" title="아래로">▼</button>
      </span>
      ${DEL("cards."+i)}
      <span class="toggle">+</span>
    </button>
    <div class="card-body">${body}${threadHTML(i)}</div></section>`;
}
/* ---- table (free-form rows × cols) ---- */
function viewTable(ci){
  const c=M.cards[ci], b=`cards.${ci}`;
  const rows=c.rows||[];
  const ncol=rows.reduce((m,r)=>Math.max(m,r.length),0)||1;
  let out='<div class="table-wrap"><table class="grid">';
  rows.forEach((row,r)=>{
    out+="<tr>";
    for(let cc=0; cc<ncol; cc++){
      const tag=r===0?"th":"td", p=b+".rows."+r+"."+cc;
      // 표 셀은 편집 모드와 무관하게 항상 입력 가능 (협업용 데이터)
      out+=`<${tag}><span class="ed tcell" data-p="${p}" contenteditable="true">${getAt(p)}</span></${tag}>`;
    }
    if(EDIT) out+=`<td class="grid-ctrl"><button class="del" data-del="${b}.rows.${r}" title="행 삭제">×</button></td>`;
    out+="</tr>";
  });
  if(EDIT){
    out+='<tr class="grid-colctrl">';
    for(let cc=0; cc<ncol; cc++) out+=`<td><button class="del" data-delcol="${ci}|${cc}" title="열 삭제">×</button></td>`;
    out+="<td></td></tr>";
  }
  out+="</table></div>";
  // 행 추가는 편집 모드가 아니어도 가능 / 열 추가·삭제는 편집 모드 전용(.add 클래스)
  out+=`<div class="table-tools"><button class="tbtn" data-add="trow|${ci}">+ 행</button>${ADD("tcol|"+ci,"열")}</div>`;
  return out;
}
/* ---- comment thread: per-comment open/done status + replies (any card) ---- */
function replyHTML(ci, cm){
  const replies=cm.replies||[];
  const items=replies.map(rp=>`<div class="rpl">
      <div class="cmt-meta mono"><b>${esc(rp.who||"익명")}</b><span>${fmtTime(rp.ts)}</span>
        <button class="cmt-del" data-rdel="${ci}|${esc(cm.id)}|${esc(rp.id)}" title="삭제">×</button></div>
      <div class="cmt-text">${esc(rp.text)}</div></div>`).join("");
  return `<div class="rpl-wrap">${items}
    <div class="rpl-add">
      <input class="thread-input rpl-input" type="text" maxlength="500" placeholder="답글…" data-rinput="${ci}|${esc(cm.id)}">
      <button class="btn thread-send" data-radd="${ci}|${esc(cm.id)}">답글</button>
    </div></div>`;
}
function threadHTML(ci){
  const c=M.cards[ci];
  const comments=c.comments||[];
  const list = comments.length
    ? comments.map(cm=>{
        const done=cm.status==="done";
        return `<div class="cmt ${done?"done":""}">
        <div class="cmt-meta mono"><b>${esc(cm.who||"익명")}</b><span>${fmtTime(cm.ts)}</span>
          <button class="cmt-status ${done?"done":"open"}" data-cstatus="${ci}|${esc(cm.id)}" title="상태 전환 — 오픈 / 완료">${done?"✓ 완료":"● 오픈"}</button>
          <button class="cmt-del" data-cdel="${ci}|${esc(cm.id)}" title="삭제">×</button></div>
        <div class="cmt-text">${esc(cm.text)}</div>
        ${replyHTML(ci, cm)}</div>`;
      }).join("")
    : `<div class="cmt-empty mono">아직 의견이 없습니다. 편집 모드가 아니어도 누구나 의견을 남길 수 있어요.</div>`;
  return `<div class="thread">
    <div class="thread-h mono"><span>의견 · <b>${comments.length}</b></span></div>
    <div class="thread-list">${list}</div>
    <div class="thread-add">
      <input class="thread-input" type="text" maxlength="500" placeholder="이 카드에 대한 의견 남기기…" data-cinput="${ci}">
      <button class="btn thread-send" data-cadd="${ci}">남기기</button>
    </div></div>`;
}

/* ---- steps ---- */
function viewSteps(ci){
  const c=M.cards[ci], b=`cards.${ci}`;
  const steps=c.items.map((s,i)=>`<li class="step" data-state="${s.s}">
    <span class="step-i mono" data-cycle="${b}.items.${i}.s">${String(i+1).padStart(2,"0")}</span>
    <span class="step-t">${E(b+".items."+i+".t")}</span>
    <span class="step-d">${E(b+".items."+i+".d")}${DEL(b+".items."+i)}</span></li>`).join("");
  const warns=(c.warns||[]).map((w,i)=>`<p>${E(b+".warns."+i)}${DEL(b+".warns."+i)}</p>`).join("");
  return `<ul class="steps">${steps}</ul>${ADD("step|"+ci,"단계")}
    <div class="hintline editonly">번호를 클릭하면 상태가 바뀝니다 — 기본 → 완료 → 진행 중</div>
    <div class="warn"><div class="warn-h mono">${E(b+".warnH")}</div>${warns}${ADD("warn|"+ci,"주의")}</div>`;
}
/* ---- risk/asset ---- */
function viewRA(ci){
  const c=M.cards[ci], b=`cards.${ci}`;
  const items=c.items.map((r,i)=>`<div class="ra-item" data-k="${r.k}">
    <span class="ra-lab mono" data-kind="${b}.items.${i}.k">${E(b+".items."+i+".l")}</span>${DEL(b+".items."+i)}
    <div class="ra-t">${E(b+".items."+i+".t")}</div>
    <p class="ra-d">${E(b+".items."+i+".d")}</p>
    <div class="ra-do mono">${E(b+".items."+i+".do")}</div></div>`).join("");
  return `<div class="ra">${items}</div>${ADD("ra|"+ci,"항목")}
    <div class="hintline editonly">라벨을 클릭하면 종류가 바뀝니다 — 리스크 → 자산 → 자산=리스크</div>`;
}
/* ---- timeline ---- */
function meter(t,l,n,b,pi){
  let s=""; for(let i=1;i<=5;i++) s+=`<i class="${i<=n?"on":""}" data-lv="${b}.items.${pi}.${t}|${i}"></i>`;
  return `<div class="meter" data-type="${t}"><span class="m-lab mono">${l}</span><span class="m-bars">${s}</span></div>`;
}
function viewTimeline(ci){
  const c=M.cards[ci], b=`cards.${ci}`;
  const strips=c.items.map((p,i)=>`<div class="strip ${i===c.active?"sel":""}" data-strip="${ci}|${i}" tabindex="0">
    <span class="s-time mono">${E(b+".items."+i+".time")}</span>
    <span class="s-name">${E(b+".items."+i+".name")}<small>${E(b+".items."+i+".note")}</small></span>
    <span class="meters">${meter("snd","SND",p.snd,b,i)}${meter("soc","SOC",p.soc,b,i)}</span>
    <span class="s-bpm mono">${E(b+".items."+i+".bpm")}</span>
    <span class="s-arrow mono">▸</span></div>`).join("");
  return `<div class="board-note mono">
      <span class="legend"><i class="swatch sw-a"></i> Sound — 음악 레벨</span>
      <span class="legend"><i class="swatch sw-p"></i> Social — 대화 · 섞임</span>
      <span>구간을 누르면 세부 계획이 열립니다</span></div>
    <div class="board">${strips}</div>${ADD("phase|"+ci,"구간")}
    <div class="hintline editonly">편집 모드에서 미터 막대를 클릭하면 레벨이 조정됩니다</div>
    ${viewDetail(ci)}`;
}
function viewDetail(ci){
  const c=M.cards[ci], b=`cards.${ci}`;
  const pi=Math.min(c.active||0, c.items.length-1);
  const p=c.items[pi]; if(!p) return "";
  const ti=Math.min(c.activeTab?.[pi]??0, p.tabs.length-1);
  const tab=p.tabs[ti]; if(!tab) return "";
  const tp=`${b}.items.${pi}.tabs.${ti}`;
  return `<div class="detail">
    <div class="d-head">
      <div class="d-kicker mono">${E(b+".items."+pi+".kicker")}</div>
      <div class="d-title">${E(b+".items."+pi+".title")}</div>
      <div class="d-sub">${E(b+".items."+pi+".sub")}${DEL(b+".items."+pi)}</div>
      <div class="tabs">${p.tabs.map((t,i)=>`<button class="tab ${i===ti?"sel":""}" data-tab="${ci}|${pi}|${i}">${t.t}</button>`).join("")}${ADD("tab|"+ci+"|"+pi,"탭")}</div>
    </div>
    <div class="d-body">
      <div class="blk-h mono editonly" style="border:0;margin-bottom:14px">탭 이름 · ${E(tp+".t")}${DEL(tp)}</div>
      ${tab.blocks.map((bl,i)=>blockHTML(bl,tp+".blocks."+i)).join("")}
      <div class="addrow editonly" style="margin-top:18px">
        ${ADD("blk|"+tp+"|p","문단")}${ADD("blk|"+tp+"|ul","리스트")}${ADD("blk|"+tp+"|run","시간표")}${ADD("blk|"+tp+"|kit","칩")}${ADD("blk|"+tp+"|rule","강조")}
      </div></div></div>`;
}
/* ---- blocks (shared by timeline tabs & custom cards) ---- */
function blockHTML(b,bp){
  if(b.ty==="rule") return `<div class="rule ${b.red?"red":""}">${E(bp+".text")}${DEL(bp)}</div>`;
  const h=`<div class="blk-h mono">${E(bp+".h")}${DEL(bp)}</div>`;
  let body="";
  if(b.ty==="p")   body=b.items.map((x,i)=>`<p>${E(bp+".items."+i)}${DEL(bp+".items."+i)}</p>`).join("");
  if(b.ty==="ul")  body=`<ul>${b.items.map((x,i)=>`<li>${E(bp+".items."+i)}${DEL(bp+".items."+i)}</li>`).join("")}</ul>`;
  if(b.ty==="run") body=b.items.map((x,i)=>`<div class="run-r"><span class="run-t mono">${E(bp+".items."+i+".0")}</span><span class="run-d">${E(bp+".items."+i+".1")}${DEL(bp+".items."+i)}</span></div>`).join("");
  if(b.ty==="kit") body=`<div class="kit">${b.items.map((x,i)=>`<span class="k">${E(bp+".items."+i)}${DEL(bp+".items."+i)}</span>`).join("")}</div>`;
  return `<div class="blk">${h}${body}${ADD("item|"+bp,"줄")}</div>`;
}
/* ---- custom card ---- */
function viewCustom(ci){
  const b=`cards.${ci}`, c=M.cards[ci];
  return `${(c.blocks||[]).map((bl,i)=>blockHTML(bl,b+".blocks."+i)).join("")}
    <div class="addrow editonly" style="margin-top:18px">
      ${ADD("blk|"+b+"|p","문단")}${ADD("blk|"+b+"|ul","리스트")}${ADD("blk|"+b+"|run","시간표")}${ADD("blk|"+b+"|kit","칩")}${ADD("blk|"+b+"|rule","강조")}
    </div>`;
}
/* ---- venue ---- */
function venueCount(c){
  let total=0,done=0,star=0;
  c.items.forEach(s=>s.q.forEach(q=>{total++; if(q.d)done++; if(q.x)star++;}));
  return {total,done,star};
}
function viewVenue(ci){
  const c=M.cards[ci], b=`cards.${ci}`, r=venueCount(c);
  const secs=c.items.map((s,si)=>{
    const qs=s.q.map((q,qi)=>{
      const hide=(c.filter.star&&!q.x)||(c.filter.todo&&q.d);
      const qp=`${b}.items.${si}.q.${qi}`;
      return `<div class="q ${q.d?"done":""} ${hide?"hide":""}">
        <span class="q-box ${q.d?"on":""}" data-check="${qp}.d">✓</span>
        <span class="q-star ${q.x?"on":""}" data-star="${qp}.x">${q.x?"★":"☆"}</span>
        <span class="q-main">
          <span class="q-t">${E(qp+".t")}${DEL(qp)}</span>
          <div class="q-note mono" contenteditable="true" data-note="${qp}.n">${q.n||""}</div>
        </span></div>`;
    }).join("");
    return `<div class="qsec"><div class="qsec-h mono">${E(b+".items."+si+".s")}${DEL(b+".items."+si)}</div>${qs}${ADD("q|"+ci+"|"+si,"질문")}</div>`;
  }).join("");
  return `<div class="q-tools">
      <button class="btn ${c.filter.star?"on":""}" data-filter="${b}.filter.star">★ 필수만</button>
      <button class="btn ${c.filter.todo?"on":""}" data-filter="${b}.filter.todo">미확인만</button>
      <button class="btn ghost" data-copyq="${ci}">텍스트 복사</button>
      <span class="prog mono">답변 <b>${r.done}</b> / ${r.total} · 필수 ${r.star}</span></div>
    ${secs}${ADD("sec|"+ci,"섹션")}
    <div class="hintline editonly">★로 필수 표시, 체크박스로 답변 완료, 아래 줄에 답변 메모</div>`;
}

/* ================= wire ================= */
function wire(){
  document.querySelectorAll('.ed[contenteditable="true"]').forEach(el=>{
    el.oninput=()=>{ setAt(el.dataset.p, el.innerHTML); save(); };
    el.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); el.blur(); } };
    el.onclick=e=>e.stopPropagation();
  });
  document.querySelectorAll("[data-note]").forEach(el=>{
    el.oninput=()=>{ setAt(el.dataset.note, el.innerText); save(); };
    el.onclick=e=>e.stopPropagation();
  });
  document.querySelectorAll(".card-head").forEach(h=>{
    h.onclick=e=>{ if(e.target.closest(".ed")||e.target.closest(".del")||e.target.closest(".mv"))return;
      // 펼침은 로컬 상태만 변경 — 저장/브로드캐스트 없이 이 사람 화면에서만 열림
      const c=M.cards[+h.dataset.card];
      if(OPEN.has(c.id)) OPEN.delete(c.id); else OPEN.add(c.id);
      renderOpenState(); };
  });
  document.querySelectorAll("[data-delcol]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const [ci,cc]=b.dataset.delcol.split("|").map(Number);
      (M.cards[ci].rows||[]).forEach(r=>r.splice(cc,1)); save(); render(); };
  });
  document.querySelectorAll("[data-cadd]").forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); addComment(+btn.dataset.cadd); };
  });
  document.querySelectorAll("[data-cinput]").forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onkeydown=e=>{ e.stopPropagation(); if(e.key==="Enter"){ e.preventDefault(); addComment(+inp.dataset.cinput); } };
  });
  document.querySelectorAll("[data-cdel]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const [ci,id]=b.dataset.cdel.split("|");
      const c=M.cards[+ci]; c.comments=(c.comments||[]).filter(x=>x.id!==id); save(); render(); };
  });
  document.querySelectorAll("[data-cstatus]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const [ci,id]=b.dataset.cstatus.split("|");
      const cm=(M.cards[+ci].comments||[]).find(x=>x.id===id); if(!cm) return;
      cm.status = cm.status==="done" ? "open" : "done"; save(); render(); };
  });
  document.querySelectorAll("[data-radd]").forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); const [ci,id]=btn.dataset.radd.split("|"); addReply(+ci,id); };
  });
  document.querySelectorAll("[data-rinput]").forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onkeydown=e=>{ e.stopPropagation(); if(e.key==="Enter"){ e.preventDefault(); const [ci,id]=inp.dataset.rinput.split("|"); addReply(+ci,id); } };
  });
  document.querySelectorAll("[data-rdel]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const [ci,cid,rid]=b.dataset.rdel.split("|");
      const cm=(M.cards[+ci].comments||[]).find(x=>x.id===cid); if(!cm) return;
      cm.replies=(cm.replies||[]).filter(x=>x.id!==rid); save(); render(); };
  });
  document.querySelectorAll("[data-mv]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const [p,d]=b.dataset.mv.split("|"); moveAt(p,+d); save(); render(); };
  });
  document.querySelectorAll(".strip").forEach(s=>{
    const go=()=>{ const [ci,pi]=s.dataset.strip.split("|").map(Number);
      M.cards[ci].active=pi; save(); render(); };
    s.onclick=e=>{ if(e.target.closest(".ed")||e.target.closest("[data-lv]")||e.target.closest(".del"))return; go(); };
    // 스트립 컨테이너 자체가 포커스일 때만 Enter/Space로 이동 — 자식 편집칸에 입력한 스페이스를 삼키지 않도록
    s.onkeydown=e=>{ if(e.target!==s) return; if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } };
  });
  document.querySelectorAll("[data-tab]").forEach(t=>{
    t.onclick=()=>{ const [ci,pi,i]=t.dataset.tab.split("|").map(Number);
      M.cards[ci].activeTab=M.cards[ci].activeTab||{}; M.cards[ci].activeTab[pi]=i; save(); render(); };
  });
  if(EDIT){
    document.querySelectorAll("[data-lv]").forEach(b=>{
      b.onclick=e=>{ e.stopPropagation(); const [p,v]=b.dataset.lv.split("|");
        setAt(p, getAt(p)===+v ? +v-1 : +v); save(); render(); };
    });
    document.querySelectorAll("[data-cycle]").forEach(el=>{
      el.onclick=()=>{ const p=el.dataset.cycle,c=getAt(p);
        setAt(p, c===""?"done":c==="done"?"now":""); save(); render(); };
    });
    document.querySelectorAll("[data-kind]").forEach(el=>{
      el.onclick=e=>{ if(e.target.closest(".ed"))return; const p=el.dataset.kind,c=getAt(p);
        setAt(p, c==="risk"?"asset":c==="asset"?"both":"risk"); save(); render(); };
    });
  }
  document.querySelectorAll("[data-check]").forEach(el=>{ el.onclick=()=>{ const p=el.dataset.check; setAt(p,!getAt(p)); save(); render(); }; });
  document.querySelectorAll("[data-star]").forEach(el=>{ el.onclick=()=>{ const p=el.dataset.star; setAt(p, getAt(p)?0:1); save(); render(); }; });
  document.querySelectorAll("[data-filter]").forEach(el=>{ el.onclick=()=>{ const p=el.dataset.filter; setAt(p,!getAt(p)); save(); render(); }; });
  document.querySelectorAll("[data-copyq]").forEach(el=>{
    el.onclick=()=>{
      const c=M.cards[+el.dataset.copyq], strip=h=>h.replace(/<[^>]+>/g,""), out=[];
      c.items.forEach(s=>{ out.push("\n■ "+strip(s.s));
        s.q.forEach((q,i)=>out.push((q.x?"★ ":"  ")+(i+1)+". "+strip(q.t))); });
      navigator.clipboard.writeText(out.join("\n")).then(()=>{
        el.textContent="복사됨"; setTimeout(()=>el.textContent="텍스트 복사",1500); });
    };
  });
  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); delAt(b.dataset.del); save(); render(); };
  });
  document.querySelectorAll("[data-add]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); doAdd(b.dataset.add); save(); render(); };
  });
}
function doAdd(a){
  const [kind,arg,arg2]=a.split("|");
  if(kind==="chip") M.head.chips.push("새 항목 <b>내용</b>");
  if(kind==="step") M.cards[+arg].items.push({s:"",t:"새 단계",d:"설명을 입력하세요."});
  if(kind==="warn") M.cards[+arg].warns.push("<b>새 주의사항.</b> 내용을 입력하세요.");
  if(kind==="ra")   M.cards[+arg].items.push({k:"risk",l:"리스크",t:"새 항목",d:"설명",do:"→ 할 일"});
  if(kind==="phase"){
    const c=M.cards[+arg];
    c.items.push({time:"00:00",name:"새 구간",note:"메모",bpm:"—",snd:2,soc:2,kicker:"Part",title:"새 구간",sub:"설명",
      tabs:[{t:"탭 1",blocks:[{ty:"ul",h:"제목",items:["내용을 입력하세요."]}]}]});
    c.active=c.items.length-1;
  }
  if(kind==="tab"){
    const c=M.cards[+arg], pi=+arg2;
    c.items[pi].tabs.push({t:"새 탭",blocks:[{ty:"ul",h:"제목",items:["내용"]}]});
    c.activeTab=c.activeTab||{}; c.activeTab[pi]=c.items[pi].tabs.length-1;
  }
  if(kind==="blk"){
    const parent=getAt(arg);
    const b = arg2==="rule" ? {ty:"rule",red:false,text:"<b>강조 —</b> 내용을 입력하세요."}
      : arg2==="run" ? {ty:"run",h:"제목",items:[["00:00","내용"]]}
      : {ty:arg2,h:"제목",items:["내용"]};
    (parent.blocks=parent.blocks||[]).push(b);
  }
  if(kind==="item"){ const b=getAt(arg); b.items.push(b.ty==="run"?["00:00","내용"]:"내용"); }
  if(kind==="q")   M.cards[+arg].items[+arg2].q.push({x:0,t:"새 질문"});
  if(kind==="sec") M.cards[+arg].items.push({s:"새 섹션",q:[{x:0,t:"새 질문"}]});
  if(kind==="trow"){ const c=M.cards[+arg]; c.rows=c.rows||[[""]];
    const ncol=c.rows.reduce((m,r)=>Math.max(m,r.length),0)||1; c.rows.push(Array(ncol).fill("")); }
  if(kind==="tcol"){ const c=M.cards[+arg]; c.rows=c.rows||[[""]]; c.rows.forEach(r=>r.push("")); }
}
function addComment(ci){
  const inp=document.querySelector('[data-cinput="'+ci+'"]');
  if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  const c=M.cards[ci];
  (c.comments=c.comments||[]).push({ id:uid("m"), who:NAME, text, ts:Date.now(), status:"open", replies:[] });
  inp.value=""; save(); render();
}
function addReply(ci, cid){
  const inp=document.querySelector('[data-rinput="'+ci+'|'+cid+'"]');
  if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  const cm=(M.cards[ci].comments||[]).find(x=>x.id===cid); if(!cm) return;
  (cm.replies=cm.replies||[]).push({ id:uid("r"), who:NAME, text, ts:Date.now() });
  inp.value=""; save(); render();
}
/* 카드 펼침 상태만 즉시 반영 — 전체 재렌더/저장 없이 이 사람 화면에서만 */
function renderOpenState(){
  document.querySelectorAll("#cards > .card").forEach((sec,i)=>{
    if(M.cards[i]) sec.setAttribute("data-open", OPEN.has(M.cards[i].id));
  });
}

/* ================= theme ================= */
const THEME_KEY = "party-board-theme";
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const btn = document.getElementById("themeBtn");
  if(btn){
    btn.textContent = t==="light" ? "☀ 라이트" : "🌙 다크";
    btn.setAttribute("aria-pressed", t==="light" ? "true" : "false");
  }
}
(function initTheme(){
  const cur = document.documentElement.getAttribute("data-theme")==="light" ? "light" : "dark";
  applyTheme(cur);
})();
document.getElementById("themeBtn").onclick=()=>{
  const cur = document.documentElement.getAttribute("data-theme")==="light" ? "light" : "dark";
  const next = cur==="light" ? "dark" : "light";
  try{ localStorage.setItem(THEME_KEY, next); }catch(e){}
  applyTheme(next);
};

/* ================= toolbar ================= */
document.getElementById("editBtn").onclick=e=>{
  EDIT=!EDIT;
  document.body.classList.toggle("edit",EDIT);
  e.target.classList.toggle("on",EDIT);
  e.target.textContent=EDIT?"✓ 완료":"✎ 편집";
  document.getElementById("footNote").textContent=EDIT?"편집 중 — 변경은 즉시 모두에게 반영됩니다":"URL을 아는 사람은 누구나 편집할 수 있습니다";
  render();
};
document.getElementById("who").oninput=e=>{ NAME=e.target.value.trim()||"익명"; };
document.getElementById("addCardMemo").onclick=()=>{
  const id="c"+Date.now(); OPEN.add(id);
  M.cards.push({ id, type:"custom", title:"새 메모 카드", open:true,
    blocks:[{ty:"ul",h:"제목",items:["내용을 입력하세요."]}] });
  save(); render();
};
document.getElementById("addCardTable").onclick=()=>{
  const id="c"+Date.now(); OPEN.add(id);
  M.cards.push({ id, type:"table", title:"새 표 카드", open:true,
    rows:[["항목","내용"],["",""]] });
  save(); render();
};
document.getElementById("exportBtn").onclick=()=>{
  const b=new Blob([JSON.stringify(M,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="party-board.json"; a.click();
};
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("모두의 보드가 초기 상태로 되돌아갑니다. 계속할까요?")){
    M=clone(DEFAULT); OPEN.clear(); M.cards.forEach(c=>{ if(c.open) OPEN.add(c.id); });
    save(); render();
  }
};

/* ================= boot ================= */
seedOpen();
render();
connect();
</script>
